<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mengalihkan ke Industrial Analytics Pro | UBP PMU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.2) 0%, transparent 80%);
        }
    </style>
</head>
<body class="min-height-screen flex flex-col items-center justify-center text-slate-100 p-6 min-h-screen">
    
    <div class="max-w-md w-full text-center space-y-8 bg-slate-900/60 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl">
        <!-- Logo / Header -->
        <div class="space-y-2">
            <h1 class="text-2xl font-black tracking-tight text-white uppercase">
                PLO <span class="text-blue-500">UBP PMU</span>
            </h1>
            <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.25em]">
                Core-MES Industrial Analytics
            </p>
        </div>

        <!-- Spinner & Status -->
        <div class="py-4 flex flex-col items-center justify-center space-y-4">
            <div class="relative w-16 h-16">
                <!-- Outer Ring -->
                <div class="absolute inset-0 rounded-full border-4 border-blue-500/10"></div>
                <!-- Spinning Ring -->
                <div class="absolute inset-0 rounded-full border-4 border-t-blue-500 animate-spin"></div>
            </div>
            
            <div class="space-y-1">
                <p class="text-xs text-slate-300 font-semibold">Menghubungkan ke server cloud...</p>
                <p class="text-[11px] text-slate-500">Mengalihkan secara otomatis dalam <span id="countdown" class="text-blue-400 font-bold">3</span> detik</p>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
            <div id="progress" class="bg-blue-500 h-full w-0 transition-all duration-1000 ease-out"></div>
        </div>

        <!-- Manual Redirection Link -->
        <div class="pt-4 border-t border-white/5">
            <p class="text-[11px] text-slate-500">
                Jika halaman tidak beralih otomatis, silakan klik tombol di bawah:
            </p>
            <a id="redirect-link" href="https://script.google.com/macros/s/AKfycbyrXtOAGZvm1ObBMWFhQahVwzNJrBiTl9Y76yugUjjYyEzvRdbQxogSkzM1siltrkf/exec" class="mt-3 inline-flex items-center justify-center w-full px-6 py-3 text-xs font-bold text-white bg-blue-600 hover:bg-blue-500 rounded-xl transition-all shadow-lg shadow-blue-600/20 uppercase tracking-wider">
                Buka Dashboard
            </a>
        </div>
    </div>

    <!-- Footer Copyright -->
    <p class="mt-8 text-[10px] text-slate-600 uppercase tracking-widest font-bold">
        © 2026 UBP PMU • Sistem Informasi PLO
    </p>

    <script>
        // URL Target Web App GAS /exec Anda (Diambil dari tangkapan layar deploy Anda)
        const TARGET_URL = "https://script.google.com/macros/s/AKfycbyrXtOAGZvm1ObBMWFhQahVwzNJrBiTl9Y76yugUjjYyEzvRdbQxogSkzM1siltrkf/exec";
        
        // Memastikan link tombol manual mengarah ke link yang benar
        document.getElementById('redirect-link').href = TARGET_URL;

        let timeLeft = 3;
        const countdownEl = document.getElementById('countdown');
        const progressEl = document.getElementById('progress');

        // Memulai animasi loading bar secara bertahap
        setTimeout(() => {
            progressEl.style.width = '100%';
        }, 100);

        // Fungsi hitung mundur
        const interval = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(interval);
                window.location.href = TARGET_URL;
            }
        }, 1000);
    </script>
</body>
</html>
