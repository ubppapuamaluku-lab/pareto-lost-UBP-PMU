<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan ke PLO UBP PMU</title>
    <!-- Tailwind CSS CDN untuk styling modern dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-progress {
            animation: progress 3s linear forwards;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #020617;
            background-image: radial-gradient(circle at 50% 50%, rgba(30, 58, 138, 0.2) 0%, transparent 80%);
        }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col items-center justify-center p-6 select-none font-sans">

    <!-- Container Utama -->
    <div class="max-w-md w-full text-center space-y-8 p-8 rounded-2xl bg-slate-900/50 border border-slate-800 backdrop-blur-sm shadow-2xl">
        
        <!-- Logo / Icon Representatif (SVG) -->
        <div class="flex justify-center">
            <div class="p-4 bg-blue-500/10 rounded-full border border-blue-500/20 text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" />
                </svg>
            </div>
        </div>

        <!-- Judul & Keterangan -->
        <div class="space-y-3">
            <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                PLO UBP PMU
            </h1>
            <p class="text-sm text-slate-400">
                Menghubungkan koneksi aman ke server database Google Sheets...
            </p>
        </div>

        <!-- Animasi Loading Bar Premium -->
        <div class="space-y-2">
            <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                <div class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full animate-progress"></div>
            </div>
            <div class="flex justify-between text-xs text-slate-500 px-1">
                <span>Mengamankan Sesi</span>
                <span>Dialihkan dalam 3 detik...</span>
            </div>
        </div>

        <!-- Tombol Cadangan jika Auto-Redirect Terhambat -->
        <div class="pt-4 border-t border-slate-800/60">
            <p class="text-xs text-slate-500 mb-3">
                Jika halaman tidak otomatis berpindah, silakan klik tombol di bawah ini:
            </p>
            <a id="redirect-link" 
               href="https://script.google.com/macros/s/AKfycbx-VYtv7XWsWlAwVpb7YgIiRW988tNe_b3rTPVNZjESLjpsE2tNa53ZlP978dIlTbro/exec" 
               class="inline-flex items-center justify-center px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-500 active:bg-blue-700 rounded-lg transition-colors shadow-lg shadow-blue-500/20 w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-slate-950">
                Masuk ke Dashboard
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 ml-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                </svg>
            </a>
        </div>
    </div>

    <!-- Informasi Copyright Kaki Halaman -->
    <div class="mt-8 text-center text-xs text-slate-600">
        &copy; 2026 UBP PMU Papua Maluku Lab. All Rights Reserved.
    </div>

    <!-- Logika Pengalihan Otomatis Murni (Mencegah Pemblokiran Cookie) -->
    <script>
        // URL Target Web App Google Apps Script Anda yang Asli dan Aktif
        const TARGET_URL = "https://script.google.com/macros/s/AKfycbx-VYtv7XWsWlAwVpb7YgIiRW988tNe_b3rTPVNZjESLjpsE2tNa53ZlP978dIlTbro/exec";

        // Mengarahkan tombol manual ke URL yang benar
        document.getElementById('redirect-link').href = TARGET_URL;

        // Eksekusi pengalihan otomatis setelah 3 detik (3000 ms) ke domain Google asli
        setTimeout(() => {
            window.location.href = TARGET_URL;
        }, 3000);
    </script>
</body>
</html>
