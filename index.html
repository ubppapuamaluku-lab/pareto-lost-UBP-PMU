<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menghubungkan ke PLO UBP PMU</title>
    <!-- Tailwind CSS CDN untuk styling modern dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-progress {
            animation: progress 3s linear forwards;
        }
        /* Mengunci scrollbar halaman utama pembungkus */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #020617;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 select-none font-sans">

    <!-- 1. HALAMAN LOADING TRANSISI (Ditampilkan di awal selama 3 detik) -->
    <div id="loading-screen" class="fixed inset-0 z-50 flex flex-col items-center justify-center p-6 bg-slate-950">
        <div class="max-w-md w-full text-center space-y-8 p-8 rounded-2xl bg-slate-900/50 border border-slate-800 backdrop-blur-sm shadow-2xl">
            <!-- Logo / Icon Representatif (SVG) -->
            <div class="flex justify-center">
                <div class="p-4 bg-blue-500/10 rounded-full border border-blue-500/20 text-blue-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 animate-pulse" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z" />
                    </svg>
                </div>
            </div>

            <!-- Judul & Keterangan -->
            <div class="space-y-3">
                <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                    PLO UBP PMU
                </h1>
                <p class="text-sm text-slate-400">
                    Menghubungkan koneksi aman ke server database Google Sheets...
                </p>
            </div>

            <!-- Animasi Loading Bar Premium -->
            <div class="space-y-2">
                <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full animate-progress"></div>
                </div>
                <div class="flex justify-between text-xs text-slate-500 px-1">
                    <span>Mengamankan Sesi</span>
                    <span>Memuat Dashboard...</span>
                </div>
            </div>
        </div>
        
        <!-- Informasi Copyright Kaki Halaman -->
        <div class="mt-8 text-center text-xs text-slate-600">
            &copy; 2026 UBP PMU Papua Maluku Lab. All Rights Reserved.
        </div>
    </div>

    <!-- 2. WRAPPER IFRAME (Menyembunyikan banner Google dengan teknik margin negatif) -->
    <div id="app-container" class="hidden relative w-full h-full overflow-hidden">
        <!-- 
          Trik CSS:
          - top: -45px (menggeser iframe ke atas sejauh 45px untuk menyembunyikan banner Google)
          - height: calc(100% + 45px) (menambah tinggi iframe agar bagian bawah tidak terpotong)
        -->
        <iframe 
            id="app-frame"
            src="https://script.google.com/macros/s/AKfycbx-VYtv7XWsWlAwVpb7YgIiRW988tNe_b3rTPVNZjESLjpsE2tNa53ZlP978dIlTbro/exec" 
            class="absolute left-0 w-full border-none"
            style="top: -45px; height: calc(100% + 45px);">
        </iframe>
    </div>

    <!-- Logika Transisi Antarmuka -->
    <script>
        const loadingScreen = document.getElementById('loading-screen');
        const appContainer = document.getElementById('app-container');

        // Setelah 3 detik, sembunyikan loading screen dan tampilkan dashboard tanpa banner
        setTimeout(() => {
            loadingScreen.classList.add('hidden');
            appContainer.classList.remove('hidden');
        }, 3000);
    </script>
</body>
</html>
